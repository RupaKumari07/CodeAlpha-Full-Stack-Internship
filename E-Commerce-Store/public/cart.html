<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - ShopHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">ShopHub</a>
    <nav>
      <a href="/">Home</a>
      <a href="/cart.html" class="cart-link">Cart <span class="cart-count" id="cartCount">0</span></a>
      <a href="/orders.html">Orders</a>
      <div class="auth-buttons" id="authButtons">
        <a href="/login.html" class="btn-outline">Login</a>
        <a href="/register.html" class="btn-primary">Register</a>
      </div>
    </nav>
  </header>

  <div class="container">
    <h1 class="page-title">Shopping Cart</h1>
    <p class="page-subtitle">Review your items before checking out</p>
    <div id="alert" class="alert"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading cart...</p>
    </div>
    <div class="cart-page" id="cartContent"></div>
  </div>

  <script src="/js/main.js"></script>
  <script src="/js/cart.js"></script>
  <script>
    async function loadCart() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('cartContent').innerHTML = '';
      try {
        const res = await fetch('/api/cart');
        if (res.status === 401) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('cartContent').innerHTML = `
            <div class="cart-empty">
              <div class="empty-icon">🔒</div>
              <p>Please <a href="/login.html">log in</a> to view your cart.</p>
            </div>
          `;
          return;
        }
        const data = await res.json();
        document.getElementById('loading').style.display = 'none';
        renderCart(data);
      } catch {
        document.getElementById('loading').style.display = 'none';
        showAlert('Error loading cart', 'error');
      }
    }

    function renderCart(data) {
      const { items, total } = data;
      if (items.length === 0) {
        document.getElementById('cartContent').innerHTML = `
          <div class="cart-empty">
            <div class="empty-icon">🛒</div>
            <p>Your cart is empty.</p>
            <p><a href="/">Browse our products →</a></p>
          </div>
        `;
        return;
      }

      let html = items.map(item => `
        <div class="cart-item">
          <img src="${item.image_url}" alt="${item.name}">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">$${item.price.toFixed(2)}</div>
          </div>
          <div class="qty-control">
            <button onclick="changeCartQty(${item.id}, ${item.quantity - 1})">−</button>
            <input type="text" value="${item.quantity}" readonly>
            <button onclick="changeCartQty(${item.id}, ${item.quantity + 1})" ${item.quantity >= item.stock ? 'disabled' : ''}>+</button>
          </div>
          <div class="item-total">$${(item.price * item.quantity).toFixed(2)}</div>
          <button class="remove-btn" onclick="removeCartItem(${item.id})">✕ Remove</button>
        </div>
      `).join('');

      html += `
        <div class="cart-summary">
          <div class="summary-row">
            <span class="total-label">Total</span>
            <span class="total">$${total.toFixed(2)}</span>
          </div>
          <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
        </div>
      `;

      document.getElementById('cartContent').innerHTML = html;
    }

    async function changeCartQty(id, newQty) {
      if (newQty <= 0) return removeCartItem(id);
      try {
        const res = await fetch(`/api/cart/update/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity: newQty })
        });
        if (res.ok) { loadCart(); updateCartCount(); }
        else {
          const data = await res.json();
          showAlert(data.error || 'Failed to update', 'error');
          loadCart();
        }
      } catch { showAlert('Error updating cart', 'error'); }
    }

    async function removeCartItem(id) {
      try {
        const res = await fetch(`/api/cart/remove/${id}`, { method: 'DELETE' });
        if (res.ok) { loadCart(); updateCartCount(); }
        else showAlert('Failed to remove item', 'error');
      } catch { showAlert('Error removing item', 'error'); }
    }

    async function checkout() {
      try {
        const res = await fetch('/api/orders/checkout', { method: 'POST' });
        const data = await res.json();
        if (res.ok) {
          showAlert(`✓ Order placed! Total: $${data.total.toFixed(2)}`, 'success');
          updateCartCount();
          loadCart();
        } else showAlert(data.error || 'Checkout failed', 'error');
      } catch { showAlert('Checkout failed', 'error'); }
    }

    loadCart();
  </script>
</body>
</html>
