<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">ShopHub</a>
    <nav>
      <a href="/">Home</a>
      <a href="/cart.html" class="cart-link">Cart <span class="cart-count" id="cartCount">0</span></a>
      <a href="/orders.html">Orders</a>
      <div class="auth-buttons" id="authButtons">
        <a href="/login.html" class="btn-outline">Login</a>
        <a href="/register.html" class="btn-primary">Register</a>
      </div>
    </nav>
  </header>

  <div class="form-wrapper">
    <div id="alert" class="alert"></div>
    <div class="form-container">
      <div class="form-icon">✨</div>
      <h2>Create Account</h2>
      <p class="form-sub">Join us and start shopping today</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" required>
        </div>
        <button type="submit" class="submit-btn">Create Account →</button>
      </form>
      <div class="link">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (res.ok) window.location.href = '/';
        else {
          errorEl.textContent = data.error || 'Registration failed';
          errorEl.style.display = 'block';
        }
      } catch {
        errorEl.textContent = 'Connection error';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
