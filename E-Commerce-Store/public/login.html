<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">ShopHub</a>
    <nav>
      <a href="/">Home</a>
      <a href="/cart.html" class="cart-link">Cart <span class="cart-count" id="cartCount">0</span></a>
      <a href="/orders.html">Orders</a>
      <div class="auth-buttons" id="authButtons">
        <a href="/login.html" class="btn-outline">Login</a>
        <a href="/register.html" class="btn-primary">Register</a>
      </div>
    </nav>
  </header>

  <div class="form-wrapper">
    <div id="alert" class="alert"></div>
    <div class="form-container">
      <div class="form-icon">🔐</div>
      <h2>Welcome Back</h2>
      <p class="form-sub">Sign in to access your account</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="submit-btn">Sign In →</button>
      </form>
      <div class="link">Don't have an account? <a href="/register.html">Create one</a></div>
    </div>
  </div>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) window.location.href = '/';
        else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch {
        errorEl.textContent = 'Connection error';
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
